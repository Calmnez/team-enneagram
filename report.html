<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 구조 진단 리포트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F6F7;
    --paper-2:#FFFFFF;
    --ink:#1B2228;
    --ink-soft:#4B5560;
    --steel:#3C5069;
    --steel-light:#7C93A8;
    --rust:#B8563A;
    --rust-bg:#FBEDE8;
    --sage:#4F7D6E;
    --sage-bg:#EAF2EF;
    --violet:#6E6584;
    --grid:#DCE2E7;
    --radius:6px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans KR', sans-serif;
    line-height:1.6;
  }
  .mono{font-family:'IBM Plex Mono', monospace;}
  #app{
    max-width:720px;
    margin:0 auto;
    padding:36px 20px 80px;
  }
  .sheet-no{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    color:var(--steel-light);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{ font-size:24px; font-weight:700; margin:0 0 4px; }
  h2{ font-size:17px; font-weight:700; margin:0 0 14px; color:var(--ink); }
  .meta-line{
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--steel-light);
    margin-bottom:28px;
  }
  section{
    border-top:1px solid var(--grid);
    padding:32px 0;
  }
  section:first-of-type{border-top:none; padding-top:0;}
  .disclaimer{
    background:var(--rust-bg);
    border:1px solid var(--rust);
    border-radius:var(--radius);
    padding:14px 16px;
    font-size:13px;
    color:#7A3A22;
    margin-bottom:28px;
    line-height:1.55;
  }
  .disclaimer strong{display:block; font-size:12px; letter-spacing:0.04em; margin-bottom:4px; font-family:'IBM Plex Mono', monospace;}
  .card{
    background:var(--paper-2);
    border:1px solid var(--grid);
    border-radius:var(--radius);
    padding:20px;
  }
  /* --- 분포 바 --- */
  .dist-row{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .dist-num{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px; font-weight:600; color:var(--steel);
    width:16px; text-align:right; flex-shrink:0;
  }
  .dist-nick{ font-size:12.5px; color:var(--ink-soft); width:78px; flex-shrink:0; }
  .dist-track{ flex:1; height:14px; background:var(--paper); border-radius:3px; overflow:hidden; }
  .dist-fill{ height:100%; background:var(--steel); }
  .dist-pct{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-soft); width:42px; text-align:right; flex-shrink:0; }
  /* --- 센터 바 --- */
  .center-bar{ display:flex; height:28px; border-radius:4px; overflow:hidden; margin-bottom:10px; }
  .center-seg{ display:flex; align-items:center; justify-content:center; color:#fff; font-family:'IBM Plex Mono', monospace; font-size:11.5px; }
  .center-legend{ display:flex; gap:16px; font-size:12px; color:var(--ink-soft); flex-wrap:wrap; }
  .center-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  /* --- 다양성 게이지 --- */
  .diversity-track{ position:relative; height:8px; background:var(--grid); border-radius:4px; margin:10px 0 6px; }
  .diversity-marker{ position:absolute; top:-4px; width:16px; height:16px; border-radius:50%; background:var(--steel); border:2px solid #fff; box-shadow:0 0 0 1px var(--steel); transform:translateX(-50%); }
  /* --- 마찰 카드 --- */
  .friction-card{
    border:1px solid var(--grid);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
    background:var(--paper-2);
  }
  .friction-card.emergent{ border-color:var(--rust); background:var(--rust-bg); }
  .friction-row{ display:flex; align-items:center; justify-content:center; gap:4px; margin-bottom:6px; }
  .type-badge{
    display:flex; flex-direction:column; align-items:center; gap:2px; flex-shrink:0;
  }
  .type-badge .num{
    width:36px; height:36px; border-radius:50%;
    border:1.5px solid var(--steel);
    color:var(--steel);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:15px;
  }
  .type-badge .nick{ font-size:10.5px; color:var(--ink-soft); }
  .connector-svg{ width:120px; height:36px; }
  .friction-meta{ font-size:11.5px; color:var(--steel-light); text-align:center; margin-bottom:8px; }
  .friction-trigger{ font-size:13.5px; color:var(--ink-soft); text-align:center; }
  .tag-new{
    display:inline-block; margin-top:8px;
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.05em;
    background:var(--rust); color:#fff; padding:3px 8px; border-radius:3px;
  }
  /* --- 게이지 3연 --- */
  .gauge-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  .gauge-col{ text-align:center; }
  .gauge-svg{ width:100%; height:auto; }
  .gauge-label{ font-size:12px; color:var(--ink-soft); margin-top:4px; }
  .gauge-value{ font-family:'IBM Plex Mono', monospace; font-size:16px; font-weight:600; }
  /* --- 서술 --- */
  .narrative p{ margin:0 0 14px; font-size:14.5px; }
  .narrative .heading-line{ font-weight:700; color:var(--steel); margin:20px 0 8px; font-size:14.5px; }
  .narrative .heading-line:first-child{ margin-top:0; }
  /* --- 상태 화면 --- */
  .state-box{ text-align:center; padding:60px 20px; }
  .state-box p{ color:var(--ink-soft); font-size:14px; margin:10px 0 20px; }
  button.ghost{
    background:transparent; border:1px solid var(--grid); color:var(--steel);
    border-radius:6px; padding:10px 18px; font-family:'IBM Plex Sans KR', sans-serif;
    font-size:14px; cursor:pointer;
  }
  button.ghost:focus-visible{ outline:2px solid var(--sage); outline-offset:2px; }
  .footer-actions{ display:flex; gap:10px; margin-top:8px; }
  .error-box{ background:var(--rust-bg); border:1px solid var(--rust); color:#7A3A22; padding:12px 14px; border-radius:6px; font-size:13.5px; }
  @media print{
    body{ background:#fff; }
    .no-print{ display:none !important; }
    section{ break-inside:avoid; }
  }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================================================
 * 설정 — 배포 전 반드시 교체
 * ========================================================== */
const BACKEND_URL = "https://script.google.com/macros/s/AKfycby9QuZ9JW_bGM3phwlhUhDmYoxWQO5vBelzu6Fq84zQ0fEwGLFmy89jGRUFa95Vaew6LQ/exec";

const TYPE_NICK = {1:"개혁가",2:"조력가",3:"성취자",4:"예술가",5:"탐구자",6:"충실한 사람",7:"열정가",8:"도전자",9:"평화주의자"};
const CENTER_COLOR = { gut: "#B8563A", heart: "#6E6584", head: "#3C5069" };
const CENTER_NAME = { gut: "장(Gut)", heart: "가슴(Heart)", head: "머리(Head)" };

/* ============================================================
 * 상태
 * ========================================================== */
const params = new URLSearchParams(location.search);
const state = {
  phase: "loading", // loading | insufficient | invalid | error | ready
  teamId: (params.get("t") || "").toUpperCase(),
  leaderKey: params.get("k") || "",
  data: null, // { team_name, respondent_count, report, narrative }
  errorMsg: "",
};

function render() {
  const app = document.getElementById("app");
  if (!state.teamId || !state.leaderKey) {
    app.innerHTML = renderMissingParams();
  } else if (state.phase === "loading") {
    app.innerHTML = renderLoading();
  } else if (state.phase === "insufficient") {
    app.innerHTML = renderInsufficient();
  } else if (state.phase === "invalid") {
    app.innerHTML = renderInvalid();
  } else if (state.phase === "error") {
    app.innerHTML = renderErrorState();
  } else if (state.phase === "ready") {
    app.innerHTML = renderReport();
  }
  bindEvents();
}

function renderMissingParams() {
  return `<div class="state-box"><h1>접근할 수 없습니다</h1><p>리포트 링크에 팀 코드와 팀장 키가 모두 포함되어 있어야 합니다.</p></div>`;
}
function renderLoading() {
  return `<div class="state-box"><p class="mono">리포트를 불러오는 중…</p></div>`;
}
function renderInsufficient() {
  const d = state.data || {};
  return `
    <div class="state-box">
      <h1>아직 리포트를 만들 수 없습니다</h1>
      <p>익명성 보호를 위해 최소 ${d.required}명 이상의 응답이 필요합니다.<br>현재 ${d.current}명 / ${d.required}명</p>
      <button class="ghost" id="retryBtn">새로고침</button>
    </div>`;
}
function renderInvalid() {
  return `<div class="state-box"><h1>접근 권한이 없습니다</h1><p>리포트 링크(팀장 키)를 다시 확인해 주세요.</p></div>`;
}
function renderErrorState() {
  return `
    <div class="state-box">
      <h1>불러오지 못했습니다</h1>
      <p>${state.errorMsg || "잠시 후 다시 시도해 주세요."}</p>
      <button class="ghost" id="retryBtn">다시 시도</button>
    </div>`;
}

/* ============================================================
 * 리포트 본문
 * ========================================================== */
function renderReport() {
  const { team_name, respondent_count, report, narrative } = state.data;
  return `
    ${renderHeader(team_name, respondent_count, report)}
    ${renderDisclaimer()}
    ${renderComposition(report)}
    ${renderFriction(report)}
    ${renderPressure(report)}
    ${renderNarrative(narrative)}
    ${renderFooter()}
  `;
}

function renderHeader(teamName, count, report) {
  return `
    <div class="sheet-no">STRUCTURAL DIAGNOSTIC REPORT · S-01</div>
    <h1>${escapeHtml(teamName)}</h1>
    <div class="meta-line">응답 ${count}명 · 생성 ${formatDate(report.meta.generatedAt)}</div>
  `;
}

function renderDisclaimer() {
  return `
    <div class="disclaimer">
      <strong>사용 범위 안내</strong>
      이 리포트는 통계적으로 검증된 진단 도구가 아니라 유형학 이론에 기반한 구조적 패턴 분석입니다.
      채용, 평가, 배치 등 인사 결정에 사용하지 마십시오.
    </div>
  `;
}

function renderComposition(report) {
  const b = report.baseline;
  const maxPct = Math.max(...Object.values(b.percentages));
  const distRows = [1,2,3,4,5,6,7,8,9].map((i) => `
    <div class="dist-row">
      <div class="dist-num">${i}</div>
      <div class="dist-nick">${TYPE_NICK[i]}</div>
      <div class="dist-track"><div class="dist-fill" style="width:${maxPct > 0 ? (b.percentages[i] / maxPct) * 100 : 0}%"></div></div>
      <div class="dist-pct mono">${b.percentages[i]}%</div>
    </div>
  `).join("");

  const c = b.center;
  const centerBar = `
    <div class="center-bar">
      <div class="center-seg" style="width:${c.gut*100}%; background:${CENTER_COLOR.gut}">${c.gut > 0.08 ? Math.round(c.gut*100)+"%" : ""}</div>
      <div class="center-seg" style="width:${c.heart*100}%; background:${CENTER_COLOR.heart}">${c.heart > 0.08 ? Math.round(c.heart*100)+"%" : ""}</div>
      <div class="center-seg" style="width:${c.head*100}%; background:${CENTER_COLOR.head}">${c.head > 0.08 ? Math.round(c.head*100)+"%" : ""}</div>
    </div>
    <div class="center-legend">
      <span><span class="legend-dot" style="background:${CENTER_COLOR.gut}"></span>${CENTER_NAME.gut}</span>
      <span><span class="legend-dot" style="background:${CENTER_COLOR.heart}"></span>${CENTER_NAME.heart}</span>
      <span><span class="legend-dot" style="background:${CENTER_COLOR.head}"></span>${CENTER_NAME.head}</span>
    </div>
  `;

  const diversityLabel = b.diversity < 0.4 ? "소수 유형에 쏠려 있음" : b.diversity < 0.7 ? "중간 정도로 분산됨" : "9유형에 고르게 분산됨";

  return `
    <section>
      <div class="sheet-no">S-02</div>
      <h2>팀 구성</h2>
      <div class="card">
        ${distRows}
        ${b.missingTypes.length ? `<div class="meta-line" style="margin-top:14px; margin-bottom:0;">비어있는 유형: ${b.missingTypes.join(", ")}번</div>` : ""}
      </div>
      <div style="height:16px"></div>
      <div class="card">
        <div class="meta-line" style="margin-bottom:8px;">중심 비율</div>
        ${centerBar}
      </div>
      <div style="height:16px"></div>
      <div class="card">
        <div class="meta-line" style="margin-bottom:0;">다양성 지수 <span class="mono">${b.diversity.toFixed(2)}</span> — ${diversityLabel}</div>
        <div class="diversity-track">
          <div class="diversity-marker" style="left:${b.diversity*100}%"></div>
        </div>
      </div>
    </section>
  `;
}

function renderFriction(report) {
  const cards = report.baseline.topFrictions.map((f) => frictionCard(f, false)).join("");
  return `
    <section>
      <div class="sheet-no">S-03</div>
      <h2>평시 마찰 진단 — 상위 ${report.baseline.topFrictions.length}개</h2>
      ${cards}
    </section>
  `;
}

function frictionCard(f, isEmergent) {
  return `
    <div class="friction-card ${isEmergent ? "emergent" : ""}">
      <div class="friction-row">
        ${typeBadge(f.pair[0])}
        ${connectorSVG(f.score)}
        ${typeBadge(f.pair[1])}
      </div>
      <div class="friction-meta mono">${f.count_i.toFixed(1)}명 × ${f.count_j.toFixed(1)}명 · ${f.axisLabel}</div>
      <div class="friction-trigger">${escapeHtml(f.trigger)}</div>
      ${isEmergent ? `<div style="text-align:center;"><span class="tag-new">NEW · 압박 시 새로 등장</span></div>` : ""}
    </div>
  `;
}

function typeBadge(t) {
  return `<div class="type-badge"><div class="num">${t}</div><div class="nick">${TYPE_NICK[t]}</div></div>`;
}

function connectorSVG(score) {
  const w = 120, h = 36, x1 = 10, x2 = w - 10, y = 20;
  return `
    <svg viewBox="0 0 ${w} ${h}" class="connector-svg">
      <line x1="${x1}" y1="${y-7}" x2="${x1}" y2="${y+7}" stroke="#3C5069" stroke-width="1.5"/>
      <line x1="${x2}" y1="${y-7}" x2="${x2}" y2="${y+7}" stroke="#3C5069" stroke-width="1.5"/>
      <line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#3C5069" stroke-width="1.2"/>
      <text x="${w/2}" y="${y-10}" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="11" fill="#3C5069">${score}/10</text>
    </svg>
  `;
}

function renderPressure(report) {
  const b = report.baseline, d = report.deadline, c = report.crisis;
  const maxLoad = Math.max(b.totalLoad, d.pressure.totalLoad, c.totalLoad) * 1.15;

  const gauges = `
    <div class="gauge-grid">
      <div class="gauge-col">
        ${gaugeSVG(b.totalLoad, maxLoad, "#3C5069")}
        <div class="gauge-value mono">${b.totalLoad.toFixed(1)}</div>
        <div class="gauge-label">평시</div>
      </div>
      <div class="gauge-col">
        ${gaugeSVG(d.pressure.totalLoad, maxLoad, "#B8563A")}
        <div class="gauge-value mono">${d.pressure.totalLoad.toFixed(1)}</div>
        <div class="gauge-label">마감 임박</div>
      </div>
      <div class="gauge-col">
        ${gaugeSVG(c.totalLoad, maxLoad, "#B8563A")}
        <div class="gauge-value mono">${c.totalLoad.toFixed(1)}</div>
        <div class="gauge-label">위기 상황</div>
      </div>
    </div>
  `;

  const cs = d.centerShift.pressure;
  const shiftLine = (label, val) => `${label} ${val >= 0 ? "+" : ""}${Math.round(val*100)}%p`;
  const centerShiftText = `${shiftLine(CENTER_NAME.gut, cs.gut)} · ${shiftLine(CENTER_NAME.heart, cs.heart)} · ${shiftLine(CENTER_NAME.head, cs.head)}`;

  const emergentCards = d.pressure.emergentFrictions.length
    ? d.pressure.emergentFrictions.map((f) => frictionCard(f, true)).join("")
    : `<p style="font-size:13.5px; color:var(--ink-soft);">평시 대비 새로 등장한 마찰 조합은 없습니다.</p>`;

  return `
    <section>
      <div class="sheet-no">S-04</div>
      <h2>압박 시뮬레이션 — 마찰 총량</h2>
      <div class="card">
        ${gauges}
        <div class="meta-line" style="margin-bottom:0;">마감 임박 시 중심 이동 — ${centerShiftText}</div>
      </div>
      <div style="height:20px"></div>
      <h2 style="font-size:15px;">마감 임박 시 새로 등장한 마찰</h2>
      ${emergentCards}
    </section>
  `;
}

function gaugeSVG(value, maxValue, color) {
  const r = 62, cx = 82, cy = 72;
  const frac = maxValue > 0 ? Math.max(0, Math.min(1, value / maxValue)) : 0;
  const angle = 180 - frac * 180;
  const rad = (angle * Math.PI) / 180;
  const nx = cx + (r - 10) * Math.cos(rad);
  const ny = cy - (r - 10) * Math.sin(rad);

  let ticks = "";
  for (let t = 0; t <= 4; t++) {
    const tf = t / 4;
    const ta = ((180 - tf * 180) * Math.PI) / 180;
    const x1t = cx + r * Math.cos(ta), y1t = cy - r * Math.sin(ta);
    const x2t = cx + (r - 7) * Math.cos(ta), y2t = cy - (r - 7) * Math.sin(ta);
    ticks += `<line x1="${x1t.toFixed(1)}" y1="${y1t.toFixed(1)}" x2="${x2t.toFixed(1)}" y2="${y2t.toFixed(1)}" stroke="#DCE2E7" stroke-width="2"/>`;
  }

  return `
    <svg viewBox="0 0 164 90" class="gauge-svg">
      <path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" fill="none" stroke="#DCE2E7" stroke-width="7" stroke-linecap="round"/>
      ${ticks}
      <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${color}" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="5" fill="${color}"/>
    </svg>
  `;
}

function renderNarrative(narrative) {
  return `
    <section>
      <div class="sheet-no">S-05</div>
      <h2>종합 서술</h2>
      <div class="card narrative">${formatNarrative(narrative)}</div>
    </section>
  `;
}

function formatNarrative(text) {
  const lines = (text || "").split(/\n+/).filter((l) => l.trim());
  return lines.map((line) => {
    const trimmed = line.trim();
    if (/^\(?[1-5]\)?[.\)]?\s/.test(trimmed) && trimmed.length < 40) {
      return `<div class="heading-line">${escapeHtml(trimmed)}</div>`;
    }
    return `<p>${escapeHtml(trimmed)}</p>`;
  }).join("");
}

function renderFooter() {
  return `
    <section class="no-print">
      <div class="footer-actions">
        <button class="ghost" id="printBtn">리포트 인쇄 / PDF 저장</button>
        <button class="ghost" id="regenBtn">서술 다시 생성</button>
      </div>
    </section>
  `;
}

/* ============================================================
 * 유틸
 * ========================================================== */
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function formatDate(iso) {
  try {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
  } catch (e) { return ""; }
}

/* ============================================================
 * 이벤트 & 데이터 로딩
 * ========================================================== */
function bindEvents() {
  const retryBtn = document.getElementById("retryBtn");
  if (retryBtn) retryBtn.addEventListener("click", () => loadReport(false));

  const printBtn = document.getElementById("printBtn");
  if (printBtn) printBtn.addEventListener("click", () => window.print());

  const regenBtn = document.getElementById("regenBtn");
  if (regenBtn) regenBtn.addEventListener("click", () => {
    if (confirm("서술을 다시 생성하면 API 비용이 다시 발생합니다. 계속할까요?")) {
      loadReport(true);
    }
  });
}

async function loadReport(forceRegenerate) {
  state.phase = "loading";
  render();
  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      body: JSON.stringify({
        action: "getTeamReport",
        team_id: state.teamId,
        leader_key: state.leaderKey,
        force_regenerate: !!forceRegenerate,
      }),
    });
    const json = await res.json();

    if (json.ok) {
      state.data = json;
      state.phase = "ready";
    } else if (json.error === "insufficient_responses") {
      state.data = { current: json.current, required: json.required };
      state.phase = "insufficient";
    } else if (json.error === "invalid_leader_key" || json.error === "team_not_found") {
      state.phase = "invalid";
    } else {
      state.errorMsg = "리포트를 생성하지 못했습니다.";
      state.phase = "error";
    }
  } catch (err) {
    state.errorMsg = "서버에 연결할 수 없습니다. 네트워크 상태를 확인해 주세요.";
    state.phase = "error";
  }
  render();
}

if (state.teamId && state.leaderKey) {
  loadReport(false);
} else {
  render();
}
</script>
</body>
</html>
